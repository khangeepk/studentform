<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)', 'glow': '0 0 15px rgba(59, 130, 246, 0.5)' }
                }
            }
        }
    </script>
    <style>
        .input-field {
            @apply w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all duration-200 outline-none text-gray-700;
        }
        .input-label {
            @apply block text-sm font-medium text-gray-700 mb-1.5;
        }
        body {
            background: radial-gradient(circle at top left, #eff6ff, #f8fafc 40%, #e2e8f0 100%);
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="flex flex-col items-center justify-center gap-3 mb-8">
            <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-glow text-white">
                <i class="fa-solid fa-graduation-cap text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wide text-gray-900">EduPortal</h1>
        </div>

        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-soft border border-gray-100 p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-brand-400 via-brand-500 to-brand-600"></div>
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-gray-500 text-sm mt-1">Please enter your details to sign in.</p>
            </div>

            <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 text-red-600 border border-red-200 rounded-lg text-sm text-center"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="input-label" for="email">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="email" id="email" name="email" class="input-field pl-11" placeholder="student@example.com" required>
                    </div>
                </div>

                <div>
                    <label class="input-label" for="password">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="password" name="password" class="input-field pl-11" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center justify-between mt-2">
                    <div class="flex items-center">
                        <input id="remember_me" type="checkbox" class="h-4 w-4 text-brand-600 focus:ring-brand-500 border-gray-300 rounded cursor-pointer">
                        <label for="remember_me" class="ml-2 block text-sm text-gray-700 cursor-pointer">Remember me</label>
                    </div>
                </div>

                <button id="submitBtn" type="submit" class="w-full relative group overflow-hidden py-3 rounded-xl bg-gray-900 text-white font-bold text-base shadow-xl hover:shadow-gray-900/40 transition-all duration-300 hover:-translate-y-0.5 mt-2">
                    <span id="submitText">Sign In</span>
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-8">
                Don't have an account? 
                <a href="register.html" class="text-brand-600 font-semibold hover:underline">Register here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('submitText');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btnText.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
            errorMsg.classList.add('hidden');

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (response.ok && result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = result.message || 'Login failed';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Cannot reach server.';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
